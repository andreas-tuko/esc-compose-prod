services:
  watchtower:
    image: nickfedor/watchtower:1
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command:
      - "--cleanup"
      - "--interval"
      - "86400"
      - "--rolling-restart"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 100M
        reservations:
          cpus: "0.05"
          memory: 50M

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGUSER=${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
      start_interval: 2s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
      start_interval: 2s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 128M
          
  web:
    image: andreastuko/esc:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
        # No dependency on seeder — web and seeder race independently.
        # Migrations run in build.sh (web startup), seeder runs reference data.
        # Both are idempotent so the order doesn't matter.
    command: ["./build.sh"]
    expose:
      - "8000"
    volumes:
      - geoip:/app/geoip
    healthcheck:
      test: ["CMD", "python3", "./docker-health-check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s   # reduced from 240s — no seeds in build.sh anymore
      start_interval: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`bamburiescorts.com`) || Host(`www.bamburiescorts.com`)"
      - "traefik.http.routers.django.entrypoints=web"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.sec-headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.sec-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.rate-limit.ratelimit.average=30"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=20"
      - "traefik.http.middlewares.rate-limit.ratelimit.period=1m"
      - "traefik.http.middlewares.health-redir.redirectregex.regex=^http://([^/]+)/health$$"
      - "traefik.http.middlewares.health-redir.redirectregex.replacement=http://$${1}/health/"
      - "traefik.http.routers.django.middlewares=sec-headers,rate-limit,health-redir"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M

  traefik:
    image: traefik:v3.6.12
    restart: unless-stopped
    ports:
      - "80:80"
    command:
        - "--providers.docker=true"
        - "--providers.docker.exposedbydefault=false"
        - "--entrypoints.web.address=:80"
        - "--entrypoints.web.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
        - "--ping=true"
        - "--accesslog=true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    security_opt:
      - no-new-privileges:true
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

  celery_worker:
      image: andreastuko/esc:latest
      restart: unless-stopped
      command: >
        celery -A esc worker
        --loglevel=info
        --concurrency=2
        --prefetch-multiplier=1
        --max-tasks-per-child=100
        --max-memory-per-child=200000
      env_file:
        - .env.docker
      depends_on:
        redis:
          condition: service_healthy
        postgres:
          condition: service_healthy
      volumes:
        - geoip:/app/geoip
      healthcheck:
          test: ["CMD-SHELL", "pgrep -f 'celery.*worker' >/dev/null"]
          interval: 30s
          timeout: 5s
          retries: 3
          start_period: 180s 
      security_opt:
        - no-new-privileges:true
      labels:
        - "com.centurylinklabs.watchtower.enable=true"
      deploy:
        resources:
          limits:
            cpus: "1.0"
            memory: 512M
          reservations:
            cpus: "0.2"
            memory: 256M

  celery_beat:
    image: andreastuko/esc:latest
    restart: unless-stopped
    command: celery -A esc beat -l info --pidfile=
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      celery_worker:
        condition: service_healthy        
    volumes:
      - geoip:/app/geoip
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
        reservations:
            cpus: "0.05"
            memory: 64M

volumes:
  redis_data:
  geoip:
  postgres_data:
  
